services:
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    working_dir: /var/www
    command: >
      sh -c "composer install --no-interaction --prefer-dist
      && touch database/database.sqlite
      && php artisan migrate --force --seed
      && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:4201

  angular:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - angular_node_modules:/app/node_modules
    ports:
      - "4201:4200"
    working_dir: /app
    command: >
      sh -c "npm install && npm run start -- --host=0.0.0.0 --port=4200"
    depends_on:
      - laravel
    stdin_open: true
    tty: true

volumes:
  angular_node_modules:
